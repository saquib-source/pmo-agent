version: "1.0"
artifact_type: governance_rules
swarm: bisd
agent: early-project-discovery
tenant: basco
status: STUB               # finalize during build Phase 5
description: >
  Authority gradient rules for Early Project Discovery.
  Posture: Full or Sign-off.
  Business object: Pre-public projects.

rules:
  - action: read_data
    decision: allow
    rationale: "Read-only access — no side-effects."

  - action: analyze
    decision: allow
    rationale: "Analysis only — no external action."

  - action: log_decision
    decision: allow
    rationale: "Append-only Trust Ledger write — cannot modify existing records." 
  - action: draft_output
    decision: gate
    gate: Review
    hard_stop: false
    timeout_hours: 24
    rationale: "Output must be reviewed before delivery." 
  - action: flag_anomaly
    decision: gate
    gate: Flag
    hard_stop: false
    timeout_hours: 48
    rationale: "Flag for human awareness; does not block agent." 
