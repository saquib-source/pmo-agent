version: "1.0"
artifact_type: workflow_definition
swarm: bisd
agent: early-project-discovery
tenant: basco
status: STUB               # implement during build Phase 3

name: early_project_discovery_workflow
display_name: "Early Project Discovery Workflow"
description: >
  Workflow for Early Project Discovery.
  Business object: Pre-public projects.
  Posture: Full or Sign-off.

trigger:
  type: continuous
  source: "Continuous"

is_active: false           # workflow does not run until Config Registry is_active = true

steps:
      - id: planning_monitor
        agent: planning_monitor_agent
        action: "STUB — define during build Phase 3"
        output: planning_monitor_result
      - id: zoning_monitor
        agent: zoning_monitor_agent
        action: "STUB — define during build Phase 3"
        output: zoning_monitor_result
      - id: permit_monitor
        agent: permit_monitor_agent
        action: "STUB — define during build Phase 3"
        output: permit_monitor_result
      - id: synthesize
        agent: early_project_discovery_orchestrator
        action: "Synthesize skill-agent outputs; produce final Pre-public projects"
        gate: Flag
        output: early_project_discovery_result

# ── Thresholds (override via Config Registry) ─────────────────────────────────
thresholds:
  sla_hours: null          # TBD — to be confirmed during build Phase 5
  escalate_after_hours: null

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  - trust_ledger:
      action: log_decision
      always: true
  - cloud_logging:
      log_name: isrds/bisd/early-project-discovery
