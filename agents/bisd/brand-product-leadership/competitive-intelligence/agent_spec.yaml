version: "1.0"
artifact_type: agent_spec
swarm: bisd
tenant: basco
generated_by: isrds-platform
status: STUB               # set to ACTIVE only when is_active: true in Config Registry

# ── Agent identity ─────────────────────────────────────────────────────────────
name: competitive_intelligence_orchestrator
display_name: "Competitive Intelligence"
description: >
  Orchestrator for the Competitive Intelligence swarm. Coordinates skill agents to produce: Competitor product and spec landscape.

sub_department: "brand-product-leadership"
business_object: "Competitor product and spec landscape"
agent_type: swarm
posture: "Full (recon)"
blocked_until: "None"
implementation_status: "Established"

# ── Runtime activation gate ───────────────────────────────────────────────────
is_active: false           # NEVER set to true without explicit go-ahead
activation_gate: MUST_APPROVE_BEFORE_LIVE

model: null                # resolved at runtime via config_registry.resolve(tenant_id, agent_id)
runtime: google-adk

# ── Sub-agents (skill mesh) ───────────────────────────────────────────────────
sub_agents:
  - name: product_monitor_agent
    role: "Product Monitor"
    authority: DECIDE_AND_REPORT
  - name: patent_monitor_agent
    role: "Patent Monitor"
    authority: DECIDE_AND_REPORT
  - name: claims_monitor_agent
    role: "Claims Monitor"
    authority: DECIDE_AND_REPORT
  - name: spec_language_monitor_agent
    role: "Spec Language Monitor"
    authority: DECIDE_AND_REPORT
  - name: gap_analysis_synthesizer_agent
    role: "Gap Analysis Synthesizer"
    authority: DECIDE_AND_REPORT
# ── Authority gradient ────────────────────────────────────────────────────────
authority_gradient:
  DECIDE_AND_REPORT:
    applies_to: [all_reads, all_analysis, log_decision]
  MUST_ESCALATE:
    applies_to: [all_writes, all_external_actions, all_commitments]
  DECIDE_SILENTLY:
    applies_to: []          # none — everything is logged

# ── Human gates ───────────────────────────────────────────────────────────────
human_gates:
    - Flag
    - Override
    - Kill

# ── Runtime layers ────────────────────────────────────────────────────────────
runtime_layers:
  1_config_registry:
    status: stub
    implementation: ../shared/config_registry.py
    source: "Firestore system_config/bisd_agent_config"

  2_agent_runtime:
    status: stub
    implementation: google-adk LlmAgent + Runner

  3_tools:
    status: stub
    implementation: ../shared/tool_registry.py
    artifact: tool_registry.yaml
    integrations: "Web, patent and standards databases, competitor sites, spec repositories"

  4_memory:
    status: stub
    implementation: ../shared/memory.py
    backend: Vertex AI Agent Engine
    artifact: memory_schema.yaml

  5_policy_governance:
    status: stub
    implementation: ../shared/governance.py + governance-rules.yaml

  6_human_override:
    status: stub
    gate_types: [Flag, Override, Kill]

  7_workflow:
    status: stub
    artifact: workflow.yaml
    trigger: "Continuous"

  8_observability:
    status: stub
    implementation: ../shared/observability.py
    destinations:
      - Cloud Logging (logName: isrds/bisd/competitive-intelligence)
      - Cloud Monitoring (custom.googleapis.com/isrds/bisd/competitive-intelligence/*)

# ── Notes for build ───────────────────────────────────────────────────────────
spec_notes: >
  Recon only, no external action. Feeds Differentiation, Cost, Delivery, and Decision-Maker Influence.

# ── Portable artifacts ────────────────────────────────────────────────────────
artifacts:
  - agent_spec.yaml          # this file
  - prompts/orchestrator.md
  - tool_registry.yaml       # stub — endpoints TBD pending vendor access
  - memory_schema.yaml       # stub — fields TBD pending requirements
  - governance-rules.yaml
  - workflow.yaml
