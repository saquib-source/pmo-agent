version: "1.0"
artifact_type: workflow_definition
swarm: bisd
agent: reputation-management
tenant: basco
status: STUB               # implement during build Phase 3

name: reputation_management_workflow
display_name: "Reputation Management Workflow"
description: >
  Workflow for Reputation Management.
  Business object: Public reviews and ratings.
  Posture: Full or Sign-off.

trigger:
  type: continuous
  source: "Continuous"

is_active: false           # workflow does not run until Config Registry is_active = true

steps:
      - id: platform_monitor
        agent: platform_monitor_agent
        action: "STUB — define during build Phase 3"
        output: platform_monitor_result
      - id: response_drafter
        agent: response_drafter_agent
        action: "STUB — define during build Phase 3"
        output: response_drafter_result
      - id: synthesize
        agent: reputation_management_orchestrator
        action: "Synthesize skill-agent outputs; produce final Public reviews and ratings"
        gate: Review
        output: reputation_management_result

# ── Thresholds (override via Config Registry) ─────────────────────────────────
thresholds:
  sla_hours: null          # TBD — to be confirmed during build Phase 5
  escalate_after_hours: null

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  - trust_ledger:
      action: log_decision
      always: true
  - cloud_logging:
      log_name: isrds/bisd/reputation-management
