<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>BISD Org Chart</title>
<style>
:root{
  --paper:#E7ECF2;--card:#F5F8FC;--card2:#EEF3F8;--ink:#1B2733;--muted:#566476;--faint:#8B9AAD;
  --line:#C7D2DE;--rail:#DCE3EC;--agent:#3B6EA5;--agent-bg:#E4ECF5;--people:#8A7356;--people-bg:#EFEAE2;
  --good:#2F8F6B;--watch:#B0852B;--risk:#B0493A;
  --ui:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'Consolas',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:linear-gradient(180deg,#EDF1F6,var(--paper));color:var(--ink);font-family:var(--ui);font-size:14px;-webkit-font-smoothing:antialiased;height:100%}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);background:#F5F8FCdd;flex-shrink:0}
.top .mark{width:30px;height:30px;border-radius:4px;background:var(--agent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.top h1{font-size:15px;font-weight:800;letter-spacing:-.2px;margin:0}
.top .crumb{font-size:11.5px;color:var(--muted)}
.spacer{flex:1}
.ctrl{font-size:11px;font-weight:600;color:var(--agent);background:transparent;border:1px solid var(--line);border-radius:3px;padding:5px 10px;cursor:pointer}
.ctrl:hover{border-color:var(--agent)}
.sim{display:inline-flex;align-items:center;gap:6px;background:#EEF2F7;border:1px solid var(--line);color:#3B4A5E;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:3px}
.sim i{width:7px;height:7px;border-radius:50%;background:#566476}
.hint{font-size:11px;color:var(--faint);padding:7px 18px;border-bottom:1px solid var(--rail);background:#EFF3F8;flex-shrink:0}
.hint b{color:var(--muted)}
.stage{flex:1;overflow:auto;padding:30px 40px 80px}

/* org tree connectors */
.tree{display:flex;justify-content:center;min-width:max-content;margin:0 auto}
.tree ul{position:relative;padding:22px 0 0;display:flex;justify-content:center;margin:0;list-style:none}
.tree li{display:flex;flex-direction:column;align-items:center;position:relative;padding:22px 9px 0;list-style:none}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--line);width:50%;height:22px}
.tree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
.tree li:only-child::before,.tree li:only-child::after{display:none}
.tree li:only-child{padding-top:22px}
.tree li:first-child::before,.tree li:last-child::after{border:0 none}
.tree li:last-child::before{border-right:2px solid var(--line);border-radius:0 7px 0 0}
.tree li:first-child::after{border-radius:7px 0 0 0}
.tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--line);width:0;height:22px;transform:translateX(-1px)}
.tree > ul{padding-top:0}
ul.collapsed{display:none}
@media (prefers-reduced-motion:no-preference){
  ul:not(.collapsed){animation:grow .18s ease-out}
  @keyframes grow{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
}

.node{border:1px solid var(--line);border-radius:5px;background:var(--card);position:relative;text-align:left;transition:border-color .12s,box-shadow .12s}
.node.branch{cursor:pointer}
.node.branch:hover{border-color:var(--agent);box-shadow:0 2px 10px -6px rgba(27,39,51,.4)}
.node .exp{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);z-index:2;min-width:22px;height:20px;padding:0 7px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--agent);font-family:var(--mono);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:3px;box-shadow:0 1px 3px rgba(27,39,51,.15)}
.node.branch:hover .exp{border-color:var(--agent)}
.node .exp .pm{font-size:12px;line-height:1}
.node.root{background:var(--ink);border-color:var(--ink);color:#fff;padding:14px 22px;min-width:200px;text-align:center}
.node.root .rname{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1}
.node.root .rsub{font-size:11px;color:#AEBCCE;margin-top:4px;letter-spacing:.02em}
.node.module{padding:11px 14px;min-width:186px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,#EEF4FA,var(--card));border-color:#BFD0E2}
.node.module .mnum{font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;background:var(--agent);width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.node.module .mname{font-size:13.5px;font-weight:800;line-height:1.1}
.node.module .marc{font-size:9.5px;color:var(--faint);font-family:var(--mono);margin-top:2px}
.node.subdept{padding:9px 13px;min-width:150px;text-align:center;background:var(--people-bg);border-color:#D8CDBE}
.node.subdept .sdname{font-size:12px;font-weight:700;line-height:1.15}
.node.subdept .sdcnt{font-size:9.5px;color:var(--people);font-family:var(--mono);margin-top:2px}
.node.fn{width:212px;border-left:3px solid var(--rail);padding:10px 11px 9px;display:flex;flex-direction:column;gap:7px;text-align:left}
.node.fn.blocked{border-left-color:var(--watch)}
.node.fn.proto{border-left-color:var(--agent);background:linear-gradient(180deg,#EDF3FA,var(--card));box-shadow:0 0 0 1px var(--agent)}
.node.fn.deferred{opacity:.85}
.fn-top{display:flex;justify-content:space-between;align-items:flex-start;gap:7px}
.fn-name{font-size:12.5px;font-weight:700;line-height:1.18;text-wrap:balance}
.fn-obj{font-size:10.5px;color:var(--muted);line-height:1.3;margin-top:2px}
.fn-alias{font-size:9.5px;color:var(--agent);font-weight:600;font-family:var(--mono);margin-top:2px}
.state{font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 5px;border-radius:2px;white-space:nowrap;border:1px solid currentColor;flex-shrink:0}
.state.dormant{color:var(--faint)}.state.blocked{color:var(--watch)}.state.proto{color:var(--agent)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:9px;font-family:var(--mono);border:1px solid var(--line);border-radius:2px;padding:1px 5px;color:var(--muted);background:var(--card2)}
.chip.posture{color:var(--agent);border-color:#BFD0E2}
.chip.gate{color:var(--people);border-color:#D8CDBE}
.mesh{display:flex;align-items:center;gap:5px;margin-top:auto}
.mesh .dots{display:inline-flex;gap:3px}
.mesh .dots i{width:5px;height:5px;border-radius:50%;background:var(--agent);opacity:.55}
.mesh .lbl{font-size:9.5px;color:var(--faint);font-family:var(--mono)}
.mesh .single{font-size:9.5px;color:var(--faint);font-family:var(--mono);font-style:italic}
.blocked-note{font-size:9.5px;color:var(--watch);line-height:1.3}
.proto-cta{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:1px;padding-top:7px;border-top:1px solid #CBDBEC}
.proto-cta .pm{display:flex;flex-direction:column}
.proto-cta .pm b{font-family:var(--mono);font-size:14px;font-weight:600;line-height:1;color:var(--agent);font-variant-numeric:tabular-nums}
.proto-cta .pm s{text-decoration:none;font-size:8px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
.proto-cta a{font-size:10.5px;font-weight:600;color:var(--agent);text-decoration:none;white-space:nowrap}
.proto-cta a:hover{text-decoration:underline}
.err{margin:40px auto;max-width:520px;padding:18px 20px;border:1px solid var(--watch);border-radius:6px;background:#FBF3E2;color:#6B531A;font-size:13px;line-height:1.5}
.err code{font-family:var(--mono);background:#fff;padding:1px 5px;border-radius:3px}
</style></head>
<body>
<div class="top">
  <div class="mark">B</div>
  <div>
    <h1>BISD Org Chart</h1>
    <div class="crumb">Basco Installed Sales Division · agentic function tree</div>
  </div>
  <span class="spacer"></span>
  <button class="ctrl" id="expandAll">Expand all</button>
  <button class="ctrl" id="collapseAll">Collapse to top</button>
  <span class="sim"><i></i>SIMULATED</span>
</div>
<div class="hint">Click any <b>node</b> to open its children. Basco &rarr; 4 value-chain stages &rarr; 9 sub-departments &rarr; 34 agentic functions. Leaf cells are the individual agents. Data generated from the <b>agent_spec.yaml</b> files.</div>

<div class="stage"><div class="tree" id="tree"></div></div>

<!-- Data is generated from the specs by generate_tree.py -->
<script src="tree.data.js"></script>
<script>
"use strict";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}

function branchInner(node){
  if(node.type==="root")
    return '<div class="rname">'+esc(node.name)+'</div><div class="rsub">'+esc(node.sub)+'</div>';
  if(node.type==="module")
    return '<span class="mnum">'+esc(node.num)+'</span><div><div class="mname">'+esc(node.name)+'</div><div class="marc">'+esc(node.arc)+'</div></div>';
  return '<div class="sdname">'+esc(node.name)+'</div><div class="sdcnt">'+node.children.length+' function'+(node.children.length>1?'s':'')+'</div>';
}
function fnClass(f){
  var c="node fn";
  if(f.proto) c+=" proto";
  else if(f.blocked && f.blocked!=="None") c+=" blocked";
  if(f.deferred) c+=" deferred";
  return c;
}
function fnState(f){
  if(f.proto) return '<span class="state proto">&bull; Prototype</span>';
  if(f.blocked && f.blocked!=="None") return '<span class="state blocked">Blocked</span>';
  return '<span class="state dormant">Dormant</span>';
}
function fnMesh(f){
  if(!f.sub) return '<div class="mesh"><span class="single">single agent</span></div>';
  var d=""; for(var i=0;i<f.sub;i++) d+='<i></i>';
  return '<div class="mesh"><span class="dots">'+d+'</span><span class="lbl">'+f.sub+' skill agents</span></div>';
}
function fnInner(f){
  var h='<div class="fn-top"><div><div class="fn-name">'+esc(f.name)+'</div>';
  if(f.alias) h+='<div class="fn-alias">'+esc(f.alias)+'</div>';
  h+='<div class="fn-obj">produces: '+esc(f.obj)+'</div></div>'+fnState(f)+'</div>';
  h+='<div class="chips"><span class="chip posture">'+esc(f.posture)+'</span>'
    +(f.gates||[]).map(function(g){return '<span class="chip gate">'+esc(g)+'</span>';}).join('')+'</div>';
  if(f.blocked && f.blocked!=="None") h+='<div class="blocked-note">&#9650; '+esc(f.blocked)+'</div>';
  h+=fnMesh(f);
  if(f.proto && f.sim) h+='<div class="proto-cta"><div class="pm"><b>'+esc(f.sim.active)+'</b><s>active</s></div>'
    +'<div class="pm"><b>'+esc(f.sim["new"])+'</b><s>new</s></div>'
    +'<a href="'+esc(f.link)+'" target="_blank" rel="noopener">Open &rarr;</a></div>';
  return h;
}
function setExp(exp, open, count){
  exp.innerHTML = open ? '<span class="pm">&minus;</span>' : '<span class="pm">+</span>'+count;
}
function renderNode(node, depth){
  var li=document.createElement("li");
  if(node.children && node.children.length){
    var box=document.createElement("div");
    box.className="node branch "+node.type;
    box.innerHTML=branchInner(node);
    var exp=document.createElement("span"); exp.className="exp"; box.appendChild(exp);
    li.appendChild(box);
    var ul=document.createElement("ul");
    node.children.forEach(function(ch){ ul.appendChild(renderNode(ch, depth+1)); });
    var expanded=(depth===0);
    if(!expanded) ul.classList.add("collapsed");
    setExp(exp, expanded, node.children.length);
    li.appendChild(ul);
    box.addEventListener("click", function(e){
      if(e.target.closest("a")) return;
      var open=ul.classList.toggle("collapsed")===false;
      setExp(exp, open, node.children.length);
    });
  } else {
    var leaf=document.createElement("div");
    leaf.className=fnClass(node);
    leaf.innerHTML=fnInner(node);
    li.appendChild(leaf);
  }
  return li;
}
function build(){
  var tree=document.getElementById("tree");
  if(typeof window.BISD_TREE==="undefined"){
    tree.innerHTML='<div class="err">Could not load <code>tree.data.js</code>. '
      +'Run <code>python generate_tree.py</code> in this folder, then reload. '
      +'If you opened this over <code>file://</code> and the browser blocked the local script, '
      +'serve the folder instead: <code>python -m http.server</code>.</div>';
    return;
  }
  tree.innerHTML="";
  var rootUl=document.createElement("ul");
  rootUl.appendChild(renderNode(window.BISD_TREE,0));
  tree.appendChild(rootUl);
}
build();
document.getElementById("expandAll").addEventListener("click",function(){
  document.querySelectorAll("#tree ul.collapsed").forEach(function(u){u.classList.remove("collapsed");});
  document.querySelectorAll("#tree .node.branch .exp").forEach(function(e){
    var li=e.closest("li"), ul=li.querySelector(":scope > ul");
    if(ul) setExp(e,true,ul.children.length);
  });
});
document.getElementById("collapseAll").addEventListener("click", build);
</script>
</body></html>
