version: "1.0"
artifact_type: agent_spec
swarm: bisd
tenant: basco
generated_by: isrds-platform
status: STUB               # set to ACTIVE only when is_active: true in Config Registry

# ── Agent identity ─────────────────────────────────────────────────────────────
name: drawing_approval_orchestrator
display_name: "Drawing Approval"
description: >
  Orchestrator for the Drawing Approval swarm. Coordinates skill agents to produce: Approved drawings.

sub_department: "turn-win-into-shipment"
business_object: "Approved drawings"
agent_type: swarm
posture: "Sign-off"
blocked_until: "None"
implementation_status: "NEW"

# ── Runtime activation gate ───────────────────────────────────────────────────
is_active: false           # NEVER set to true without explicit go-ahead
activation_gate: MUST_APPROVE_BEFORE_LIVE

model: null                # resolved at runtime via config_registry.resolve(tenant_id, agent_id)
runtime: google-adk

# ── Sub-agents (skill mesh) ───────────────────────────────────────────────────
sub_agents:
  - name: submittal_generator_agent
    role: "Submittal Generator"
    authority: MUST_ESCALATE
  - name: shop_drawing_producer_agent
    role: "Shop Drawing Producer"
    authority: MUST_ESCALATE
  - name: approval_cycle_manager_agent
    role: "Approval Cycle Manager"
    authority: MUST_ESCALATE
# ── Authority gradient ────────────────────────────────────────────────────────
authority_gradient:
  DECIDE_AND_REPORT:
    applies_to: [all_reads, all_analysis, log_decision]
  MUST_ESCALATE:
    applies_to: [all_writes, all_external_actions, all_commitments]
  DECIDE_SILENTLY:
    applies_to: []          # none — everything is logged

# ── Human gates ───────────────────────────────────────────────────────────────
human_gates:
    - Approve
    - Review

# ── Runtime layers ────────────────────────────────────────────────────────────
runtime_layers:
  1_config_registry:
    status: stub
    implementation: ../shared/config_registry.py
    source: "Firestore system_config/bisd_agent_config"

  2_agent_runtime:
    status: stub
    implementation: google-adk LlmAgent + Runner

  3_tools:
    status: stub
    implementation: ../shared/tool_registry.py
    artifact: tool_registry.yaml
    integrations: "Document generation, architect portals"

  4_memory:
    status: stub
    implementation: ../shared/memory.py
    backend: Vertex AI Agent Engine
    artifact: memory_schema.yaml

  5_policy_governance:
    status: stub
    implementation: ../shared/governance.py + governance-rules.yaml

  6_human_override:
    status: stub
    gate_types: [Approve, Review]

  7_workflow:
    status: stub
    artifact: workflow.yaml
    trigger: "Event: order created"

  8_observability:
    status: stub
    implementation: ../shared/observability.py
    destinations:
      - Cloud Logging (logName: isrds/bisd/drawing-approval)
      - Cloud Monitoring (custom.googleapis.com/isrds/bisd/drawing-approval/*)

# ── Notes for build ───────────────────────────────────────────────────────────
spec_notes: >
  HARD SEQUENCE GATE: drawings approved before Door Production.

# ── Portable artifacts ────────────────────────────────────────────────────────
