  3_tools:
    status: stub
    implementation: ../shared/tool_registry.py
    artifact: tool_registry.yaml
    integrations: "Purchasing, production, warehouse, operations systems; bypasses legacy AS400 where needed"

  4_memory:
    status: stub
    implementation: ../shared/memory.py
    backend: Vertex AI Agent Engine
    artifact: memory_schema.yaml

  5_policy_governance:
    status: stub
    implementation: ../shared/governance.py + governance-rules.yaml

  6_human_override:
    status: stub
    gate_types: [Approve, Review, Escalate]

  7_workflow:
    status: stub
    artifact: workflow.yaml
    trigger: "Event: won bid"

  8_observability:
    status: stub
    implementation: ../shared/observability.py
    destinations:
      - Cloud Logging (logName: isrds/bisd/order-realization)
      - Cloud Monitoring (custom.googleapis.com/isrds/bisd/order-realization/*)

# ── Notes for build ───────────────────────────────────────────────────────────
