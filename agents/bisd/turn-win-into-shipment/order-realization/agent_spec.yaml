version: "1.0"
artifact_type: agent_spec
swarm: bisd
tenant: basco
generated_by: isrds-platform
status: STUB               # set to ACTIVE only when is_active: true in Config Registry

# ── Agent identity ─────────────────────────────────────────────────────────────
name: order_realization_orchestrator
display_name: "Order Realization"
description: >
  Orchestrator for the Order Realization swarm. Coordinates skill agents to produce: Internal order.

sub_department: "turn-win-into-shipment"
business_object: "Internal order"
agent_type: swarm
posture: "Augment"
blocked_until: "Internal fulfillment chain not yet engaged"
implementation_status: "Established"

# ── Runtime activation gate ───────────────────────────────────────────────────
is_active: false           # NEVER set to true without explicit go-ahead
activation_gate: MUST_APPROVE_BEFORE_LIVE

model: null                # resolved at runtime via config_registry.resolve(tenant_id, agent_id)
runtime: google-adk

# ── Sub-agents (skill mesh) ───────────────────────────────────────────────────
sub_agents:
  - name: cost_accounting_handoff_agent
    role: "Cost-Accounting Handoff"
    authority: MUST_ESCALATE
  - name: purchasing_orchestrator_agent
    role: "Purchasing Orchestrator"
    authority: MUST_ESCALATE
  - name: production_scheduler_agent
    role: "Production Scheduler"
    authority: MUST_ESCALATE
  - name: warehouse_coordinator_agent
    role: "Warehouse Coordinator"
    authority: MUST_ESCALATE
  - name: operations_router_agent
    role: "Operations Router"
    authority: MUST_ESCALATE
# ── Authority gradient ────────────────────────────────────────────────────────
authority_gradient:
  DECIDE_AND_REPORT:
    applies_to: [all_reads, all_analysis, log_decision]
  MUST_ESCALATE:
    applies_to: [all_writes, all_external_actions, all_commitments]
  DECIDE_SILENTLY:
    applies_to: []          # none — everything is logged

# ── Human gates ───────────────────────────────────────────────────────────────
human_gates:
    - Approve
    - Review
    - Escalate

# ── Runtime layers ────────────────────────────────────────────────────────────
