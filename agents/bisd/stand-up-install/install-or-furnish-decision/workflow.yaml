thresholds:
  sla_hours: null          # TBD — to be confirmed during build Phase 5
  escalate_after_hours: null

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  - trust_ledger:
      action: log_decision
      always: true
  - cloud_logging:
      log_name: isrds/bisd/install-or-furnish-decision
