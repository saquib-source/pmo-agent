version: "1.0"
artifact_type: governance_rules
swarm: bisd
agent: install-execution
tenant: basco
status: STUB               # finalize during build Phase 5
description: >
  Authority gradient rules for Install Execution.
  Posture: Full.
  Business object: Work order.

rules:
  - action: read_data
    decision: allow
    rationale: "Read-only access — no side-effects."

  - action: analyze
    decision: allow
    rationale: "Analysis only — no external action."

  - action: log_decision
    decision: allow
    rationale: "Append-only Trust Ledger write — cannot modify existing records." 
  - action: commit_external_action
    decision: gate
    gate: Approve
    hard_stop: true
    timeout: null           # HARD GATE — no timeout. Agent waits indefinitely.
    rationale: "Irreversible external action. Requires explicit human approval. No timeout." 
  - action: flag_anomaly
    decision: gate
    gate: Flag
    hard_stop: false
    timeout_hours: 48
    rationale: "Flag for human awareness; does not block agent." 
  - action: override
    decision: gate
    gate: Override
    hard_stop: true
    timeout: null
    rationale: "Override reverses an agent decision. Hard gate, no timeout." 
