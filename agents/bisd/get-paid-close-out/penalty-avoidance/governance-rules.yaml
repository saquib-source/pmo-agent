version: "1.0"
artifact_type: governance_rules
swarm: bisd
agent: penalty-avoidance
tenant: basco
status: STUB               # finalize during build Phase 5
description: >
  Authority gradient rules for Penalty Avoidance.
  Posture: Full.
  Business object: Schedule risk.

rules:
  - action: read_data
    decision: allow
    rationale: "Read-only access — no side-effects."

  - action: analyze
    decision: allow
    rationale: "Analysis only — no external action."

  - action: log_decision
    decision: allow
    rationale: "Append-only Trust Ledger write — cannot modify existing records." 
  - action: escalate
    decision: gate
    gate: Escalate
    hard_stop: false
    timeout_hours: 4
    rationale: "Escalations are sent to leadership and must reflect considered judgment." 
  - action: flag_anomaly
    decision: gate
    gate: Flag
    hard_stop: false
    timeout_hours: 48
    rationale: "Flag for human awareness; does not block agent." 
