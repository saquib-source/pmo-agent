version: "1.0"
artifact_type: agent_spec
swarm: bisd
tenant: basco
generated_by: isrds-platform
status: STUB               # set to ACTIVE only when is_active: true in Config Registry

# ── Agent identity ─────────────────────────────────────────────────────────────
name: bid_selection_orchestrator
display_name: "Bid Selection (Go / No-Go)"
description: >
  Orchestrator for the Bid Selection (Go / No-Go) swarm. Coordinates skill agents to produce: Bid decision.

sub_department: "win-the-bid"
business_object: "Bid decision"
agent_type: swarm
posture: "Augment"
blocked_until: "None"
implementation_status: "Established"

# ── Runtime activation gate ───────────────────────────────────────────────────
is_active: false           # NEVER set to true without explicit go-ahead
activation_gate: MUST_APPROVE_BEFORE_LIVE

model: null                # resolved at runtime via config_registry.resolve(tenant_id, agent_id)
runtime: google-adk

# ── Sub-agents (skill mesh) ───────────────────────────────────────────────────
sub_agents:
  - name: rfp_parser_agent
    role: "RFP Parser"
    authority: MUST_ESCALATE
  - name: opportunity_sizer_agent
    role: "Door Opportunity Sizer"
    authority: MUST_ESCALATE
  - name: div10_scope_splitter_agent
    role: "Division 10 Scope Splitter"
    authority: MUST_ESCALATE
  - name: substitution_detector_agent
    role: "Substitution Clause Detector"
    authority: MUST_ESCALATE
  - name: recommendation_synthesizer_agent
    role: "Recommendation Synthesizer"
    authority: MUST_ESCALATE
# ── Authority gradient ────────────────────────────────────────────────────────
authority_gradient:
  DECIDE_AND_REPORT:
    applies_to: [all_reads, all_analysis, log_decision]
  MUST_ESCALATE:
    applies_to: [all_writes, all_external_actions, all_commitments]
  DECIDE_SILENTLY:
    applies_to: []          # none — everything is logged

# ── Human gates ───────────────────────────────────────────────────────────────
human_gates:
    - Review
    - Escalate

# ── Runtime layers ────────────────────────────────────────────────────────────
runtime_layers:
  1_config_registry:
    status: stub
    implementation: ../shared/config_registry.py
