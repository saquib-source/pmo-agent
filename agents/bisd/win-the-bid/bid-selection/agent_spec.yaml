  2_agent_runtime:
    status: stub
    implementation: google-adk LlmAgent + Runner

  3_tools:
    status: stub
    implementation: ../shared/tool_registry.py
    artifact: tool_registry.yaml
    integrations: "Document and plan parsing"

  4_memory:
    status: stub
    implementation: ../shared/memory.py
    backend: Vertex AI Agent Engine
    artifact: memory_schema.yaml

  5_policy_governance:
    status: stub
    implementation: ../shared/governance.py + governance-rules.yaml

  6_human_override:
    status: stub
    gate_types: [Review, Escalate]

  7_workflow:
    status: stub
    artifact: workflow.yaml
    trigger: "Event: new qualified RFP"

  8_observability:
    status: stub
    implementation: ../shared/observability.py
    destinations:
      - Cloud Logging (logName: isrds/bisd/bid-selection)
      - Cloud Monitoring (custom.googleapis.com/isrds/bisd/bid-selection/*)

# ── Notes for build ───────────────────────────────────────────────────────────
