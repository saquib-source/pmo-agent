version: "1.0"
artifact_type: workflow_definition
swarm: bisd
agent: division-10-sourcing
tenant: basco
status: STUB               # implement during build Phase 3

name: division_10_sourcing_workflow
display_name: "Division 10 Sourcing Workflow"
description: >
  Workflow for Division 10 Sourcing.
  Business object: Division 10 scope.
  Posture: Full or Sign-off.

trigger:
  type: event
  source: "Event: Division 10 scope present"

is_active: false           # workflow does not run until Config Registry is_active = true

steps:
      - id: spec_reader
        agent: spec_reader_agent
        action: "STUB — define during build Phase 3"
        output: spec_reader_result
      - id: vendor_pricer
        agent: vendor_pricer_agent
        action: "STUB — define during build Phase 3"
        output: vendor_pricer_result
      - id: vendor_account_opener
        agent: vendor_account_opener_agent
        action: "STUB — define during build Phase 3"
        output: vendor_account_opener_result
      - id: synthesize
        agent: division_10_sourcing_orchestrator
        action: "Synthesize skill-agent outputs; produce final Division 10 scope"
        gate: Approve
        output: division_10_sourcing_result

# ── Thresholds (override via Config Registry) ─────────────────────────────────
thresholds:
  sla_hours: null          # TBD — to be confirmed during build Phase 5
  escalate_after_hours: null

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  - trust_ledger:
      action: log_decision
      always: true
  - cloud_logging:
      log_name: isrds/bisd/division-10-sourcing
