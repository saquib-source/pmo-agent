version: "1.0"
artifact_type: agent_spec
swarm: bisd
tenant: basco
generated_by: isrds-platform
status: STUB               # set to ACTIVE only when is_active: true in Config Registry

# ── Agent identity ─────────────────────────────────────────────────────────────
name: bid_pricing_orchestrator
display_name: "Bid Pricing"
description: >
  Orchestrator for the Bid Pricing swarm. Coordinates skill agents to produce: Bid price.

sub_department: "win-the-bid"
business_object: "Bid price"
agent_type: swarm
posture: "Augment"
blocked_until: "Cost accounting model (Kelsey, Tom)"
implementation_status: "Established"

# ── Runtime activation gate ───────────────────────────────────────────────────
is_active: false           # NEVER set to true without explicit go-ahead
activation_gate: MUST_APPROVE_BEFORE_LIVE

model: null                # resolved at runtime via config_registry.resolve(tenant_id, agent_id)
runtime: google-adk

# ── Sub-agents (skill mesh) ───────────────────────────────────────────────────
sub_agents:
  - name: takeoff_counter_agent
    role: "Takeoff Counter"
    authority: MUST_ESCALATE
  - name: product_selector_agent
    role: "Product Selector"
    authority: MUST_ESCALATE
  - name: freight_tariff_pricer_agent
    role: "Freight and Tariff Pricer"
    authority: MUST_ESCALATE
  - name: margin_calculator_agent
    role: "Margin Calculator"
    authority: MUST_ESCALATE
# ── Authority gradient ────────────────────────────────────────────────────────
authority_gradient:
  DECIDE_AND_REPORT:
    applies_to: [all_reads, all_analysis, log_decision]
  MUST_ESCALATE:
    applies_to: [all_writes, all_external_actions, all_commitments]
  DECIDE_SILENTLY:
    applies_to: []          # none — everything is logged

# ── Human gates ───────────────────────────────────────────────────────────────
human_gates:
    - Review
    - Approve

# ── Runtime layers ────────────────────────────────────────────────────────────
runtime_layers:
  1_config_registry:
    status: stub
    implementation: ../shared/config_registry.py
    source: "Firestore system_config/bisd_agent_config"

  2_agent_runtime:
    status: stub
    implementation: google-adk LlmAgent + Runner

  3_tools:
    status: stub
    implementation: ../shared/tool_registry.py
    artifact: tool_registry.yaml
    integrations: "Plan reading, price book, tariff and freight data"

  4_memory:
    status: stub
    implementation: ../shared/memory.py
    backend: Vertex AI Agent Engine
    artifact: memory_schema.yaml

  5_policy_governance:
    status: stub
    implementation: ../shared/governance.py + governance-rules.yaml

  6_human_override:
    status: stub
    gate_types: [Review, Approve]

  7_workflow:
    status: stub
    artifact: workflow.yaml
    trigger: "Event: go decision"

  8_observability:
    status: stub
    implementation: ../shared/observability.py
    destinations:
      - Cloud Logging (logName: isrds/bisd/bid-pricing)
      - Cloud Monitoring (custom.googleapis.com/isrds/bisd/bid-pricing/*)

# ── Notes for build ───────────────────────────────────────────────────────────
spec_notes: >
  Centerpiece. Tariff-aware, margin by mix. Gated until cost model is confirmed.

# ── Portable artifacts ────────────────────────────────────────────────────────
artifacts:
  - agent_spec.yaml          # this file
  - prompts/orchestrator.md
  - tool_registry.yaml       # stub — endpoints TBD pending vendor access
  - memory_schema.yaml       # stub — fields TBD pending requirements
  - governance-rules.yaml
  - workflow.yaml
