version: "1.0"
artifact_type: workflow_definition
swarm: bisd
agent: substitution-approval
tenant: basco
status: STUB               # implement during build Phase 3

name: substitution_approval_workflow
display_name: "Substitution Approval Workflow"
description: >
  Workflow for Substitution Approval.
  Business object: Or-equal approval.
  Posture: Sign-off.

trigger:
  type: event
  source: "Event: substitution allowance detected"

is_active: false           # workflow does not run until Config Registry is_active = true

steps:
      - id: sample_fulfillment
        agent: sample_fulfillment_agent
        action: "STUB — define during build Phase 3"
        output: sample_fulfillment_result
      - id: architect_outreach
        agent: architect_outreach_agent
        action: "STUB — define during build Phase 3"
        output: architect_outreach_result
      - id: addendum_tracker
        agent: addendum_tracker_agent
        action: "STUB — define during build Phase 3"
        output: addendum_tracker_result
      - id: synthesize
        agent: substitution_approval_orchestrator
        action: "Synthesize skill-agent outputs; produce final Or-equal approval"
        gate: Approve
        output: substitution_approval_result

# ── Thresholds (override via Config Registry) ─────────────────────────────────
thresholds:
  sla_hours: null          # TBD — to be confirmed during build Phase 5
  escalate_after_hours: null

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  - trust_ledger:
      action: log_decision
      always: true
  - cloud_logging:
      log_name: isrds/bisd/substitution-approval
