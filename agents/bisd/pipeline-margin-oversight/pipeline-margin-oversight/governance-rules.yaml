swarm: bisd
agent: pipeline-margin-oversight
tenant: basco
status: STUB               # finalize during build Phase 5
description: >
  Authority gradient rules for Pipeline and Margin Oversight.
  Posture: Full.
  Business object: Commercial performance.

rules:
  - action: read_data
    decision: allow
    rationale: "Read-only access — no side-effects."

  - action: analyze
    decision: allow
    rationale: "Analysis only — no external action."

  - action: log_decision
    decision: allow
    rationale: "Append-only Trust Ledger write — cannot modify existing records." 
  - action: flag_anomaly
    decision: gate
    gate: Flag
    hard_stop: false
    timeout_hours: 48
    rationale: "Flag for human awareness; does not block agent." 
