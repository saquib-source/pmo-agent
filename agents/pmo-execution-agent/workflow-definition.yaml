apiVersion: isrds.agent/v1
kind: WorkflowDefinition
agent_id: pmo-execution-agent
triggers:
  schedule:
    - cron: "0 7 * * 1-5"
      timezone: "America/Chicago"
      description: "Weekday morning Operating Brief (07:00 CT)"
    - cron: "*/5 * * * *"
      timezone: "America/Chicago"
      description: "Testing mode: every 5 minutes (disable in production)"
  events:
    - signal: blocker_created
      source: pubsub
      description: "Triggered when a blocker link is added in Jira"
    - signal: assignee_removed
      source: pubsub
      description: "Triggered when a ticket loses its assignee"
contracts:
  input: { ref: "agent-spec.yaml#/spec/inputs" }
  output: { ref: "agent-spec.yaml#/spec/outputs" }
steps:
  - id: find_stalled
    tool: jira_mcp
    action: find_stalled_issues
    description: "Scan for tickets with no activity beyond threshold"
  - id: get_sprint
    tool: jira_mcp
    action: get_sprint_issues
    description: "Load full active sprint for health metrics"
  - id: get_changes
    tool: jira_mcp
    action: get_changes_since
    description: "Identify what changed since last brief"
  - id: deep_dive_blockers
    tool: jira_mcp
    action: get_issue
    description: "Get full details and changelog for blocked tickets"
  - id: analyze_gaps
    description: "Apply judgment rules: stalled, missing owners, build-gaps, at-risk"
  - id: draft_pings
    tool: draft_followup_ping
    gate: Review
    description: "Draft chase pings for stalled/orphaned tickets"
  - id: compose_brief
    description: "Format the Operating Brief with all findings"
  - id: create_gates
    tool: governance_gate
    description: "Create Review/Flag/Escalate gates as needed"
gates:
  - type: Review
    supervisor: COO
    sla: 30m
    description: "COO reviews Operating Brief and chase pings before distribution"
  - type: Flag
    supervisor: COO
    sla: 1h
    description: "COO alerted on missing owners and build-gaps on critical path"
  - type: Escalate
    supervisor: Founder
    sla: 2h
    description: "Founder reviews tickets stalled beyond escalation threshold"
