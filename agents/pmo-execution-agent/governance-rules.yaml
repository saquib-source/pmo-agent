apiVersion: isrds.agent/v1
kind: GovernanceRules
agent_id: pmo-execution-agent
invariants:
  - id: no-vendor-in-runtime
    rule: "No action may hardcode a runtime engine."
    on_violation: deny
  - id: irreversible-requires-approve
    rule: "Any irreversible action requires an Approve gate."
    on_violation: gate
    gate: Approve
  - id: trust-ledger-audit
    rule: "Every decision and tool call is logged to the Trust Ledger (FR-7)."
    on_violation: deny
rules:
  - action: search_issues
    decision: allow
    rationale: "Read-only JQL search."
  - action: get_issue
    decision: allow
    rationale: "Read-only issue fetch."
  - action: get_changelog
    decision: allow
    rationale: "Read-only transition history."
  - action: get_sprint_issues
    decision: allow
    rationale: "Read-only sprint data."
  - action: get_board_sprints
    decision: allow
    rationale: "Read-only board config."
  - action: find_stalled_issues
    decision: allow
    rationale: "Read-only staleness scan."
  - action: get_changes_since
    decision: allow
    rationale: "Read-only change history."
  - action: draft_followup_ping
    decision: gate
    gate: Review
    rationale: "Drafted pings are external-facing — Review before distribution."
  - action: governance_gate
    decision: allow
    rationale: "Creating gates is an internal governance action."
  - action: log_decision
    decision: allow
    rationale: "Trust Ledger append is an audit action."
escalation:
  - condition: "ticket_stalled_72h"
    gate: Escalate
    to: Founder
    rationale: "72h stall → organizational impediment beyond agent scope."
  - condition: "missing_owner_critical_path"
    gate: Flag
    to: COO
    rationale: "Critical-path ticket without owner is immediate risk."
  - condition: "build_gap_detected"
    gate: Flag
    to: COO
    rationale: "Cascading blocker requires human intervention."
