apiVersion: isrds.agent/v1
kind: AgentSpec
metadata:
  name: pmo-execution-agent
  version: "2.0"
  description: >
    PMO Execution Agent — reads live Jira data for status, blockers, and RACI ownership.
    Automates chasing by identifying stalled tickets (>24h) and orphaned tickets,
    drafting follow-up pings, and producing a daily Operating Brief.
spec:
  tier: 2
  authority: DECIDE_AND_REPORT
  inputs:
    - source: jira
      description: "Live Jira board — active sprint tickets, transitions, blockers"
    - source: jira_changelog
      description: "Jira transition history for staleness and 'what changed' calculation"
  outputs:
    - type: operating_brief
      description: "Daily Operating Brief: build-gaps, blockers (>24h), at-risk items, missing owners, changes since yesterday"
      gate: Review
    - type: chase_pings
      description: "Follow-up ping drafts for stalled/orphaned tickets"
      gate: Review
    - type: escalation_alerts
      description: "Critical escalation alerts for Founder (>72h stall) or COO (missing critical-path owner)"
      gate: Flag
  gates:
    - type: Review
      supervisor: COO
      sla: 30m
    - type: Flag
      supervisor: COO
      sla: 1h
    - type: Escalate
      supervisor: Founder
      sla: 2h
  schedule:
    - cron: "0 7 * * 1-5"
      timezone: "America/Chicago"
      description: "Weekday morning Operating Brief (07:00 CT)"
    - cron: "*/5 * * * *"
      timezone: "America/Chicago"
      description: "Testing mode: every 5 minutes (disable in production)"
  build:
    posture: absorb
    codebase: isrds
    extends: BaseRoleAgent
    role_category: execution
    config_registry_seed:
      engine: vertex_ai
      model: config_resolved
    reuse:
      from: examples/pmo-agent
      adapts: prompt, tool-registry, governance-rules
