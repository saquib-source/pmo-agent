apiVersion: isrds.agent/v1
kind: ToolRegistry
agent_id: pmo-execution-agent
tools:
  - id: jira_mcp
    name: "Jira MCP Server (custom)"
    integration: mcp
    mcp:
      server: jira-mcp-server
      transport: streamable-http
      url_env: JIRA_MCP_URL
    actions:
      - search_issues
      - get_issue
      - get_changelog
      - get_sprint_issues
      - get_board_sprints
      - find_stalled_issues
      - get_changes_since
    irreversible: false
    rationale: "All read-only Jira operations. No blast radius."

  - id: governance_gate
    name: "Human Gate Creator"
    integration: custom
    actions:
      - governance_gate
    irreversible: false
    rationale: "Creates gate requests for human review. Agent pauses until approved."

  - id: log_decision
    name: "Trust Ledger Logger"
    integration: custom
    actions:
      - log_decision
    irreversible: false
    rationale: "Append-only logging to Trust Ledger (FR-7). No blast radius."

  - id: draft_followup_ping
    name: "Chase Ping Drafter"
    integration: custom
    actions:
      - draft_followup_ping
    irreversible: false
    rationale: "Drafts messages — does NOT send. Distribution requires Review gate."
